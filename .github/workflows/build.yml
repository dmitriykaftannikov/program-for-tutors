name: Build to GHCR

run-name: "Build and push image for ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run tests
      run: |
        echo "Тесты пока отключены. Возвращаем успешный статус."

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and Push image
      run: |
        IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
        docker build \
          --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
          -t "${IMAGE}:latest" \
          -t "${IMAGE}:${{ github.sha }}" \
          ./app
        docker push "${IMAGE}:latest"
        docker push "${IMAGE}:${{ github.sha }}"

    - name: Set IMAGE_TAG in Coolify
      continue-on-error: true
      env:
        COOLIFY_API: ${{ secrets.COOLIFY_API }}
        COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        COOLIFY_APP: ${{ secrets.COOLIFY_APP }}
      run: |
        curl -sS -X PATCH \
          -H "Authorization: Bearer $COOLIFY_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "$COOLIFY_API/applications/$COOLIFY_APP/envs/bulk" \
          -d "{\"data\":[{\"key\":\"IMAGE_TAG\",\"value\":\"${{ github.sha }}\"}]}" \
        || echo "::warning::Coolify IMAGE_TAG update failed"

    - name: Trigger Coolify deploy
      continue-on-error: true
      env:
        COOLIFY_API: ${{ secrets.COOLIFY_API }}
        COOLIFY_APP: ${{ secrets.COOLIFY_APP }}
        COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      run: |
        echo "Triggering Coolify deploy... ($COOLIFY_API/deploy?uuid=$COOLIFY_APP&force=true)"
        curl -sS -X POST \
          "$COOLIFY_API/deploy?uuid=$COOLIFY_APP&force=true" \
          -H "Authorization: Bearer $COOLIFY_TOKEN" \
        || echo "::warning::Coolify deploy trigger failed"
